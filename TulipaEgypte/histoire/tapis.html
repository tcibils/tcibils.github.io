<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le tapis volant</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    :root {
      --sable: #F5E6C8;
      --or: #C9A84C;
      --or-fonce: #8B6914;
      --violet-tulipa: #7B3FA0;
      --noir-ecrit: #2A1F0E;
      --rouge-danger: #C0392B;
      --vert-victoire: #27AE60;
      --bleu-nuit: #1A237E;
    }
    body {
      background: linear-gradient(160deg, #1A237E 0%, var(--sable) 100%);
      font-family: 'Caveat', cursive;
      font-size: 1.5rem;
      color: var(--violet-tulipa);
      max-width: 680px;
      margin: 0 auto;
      padding: 2rem;
      min-height: 100vh;
    }
    .page {
      background: #FEFAF0;
      border-radius: 8px;
      padding: 2.5rem;
      box-shadow: 4px 4px 20px rgba(0,0,0,0.18);
      border: 2px solid var(--or);
    }
    h1 { font-family: 'Fredoka One', cursive; color: var(--bleu-nuit); font-size: 2.2rem; margin-top: 0; }
    hr { border: none; border-top: 2px solid var(--or); margin: 1.5rem 0; }
    .btn-choix {
      display: block;
      width: 100%;
      margin: 0.8rem 0;
      padding: 1rem 1.5rem;
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      border: 3px solid var(--or-fonce);
      border-radius: 12px;
      background: var(--or);
      color: white;
      text-decoration: none;
      text-align: center;
      cursor: pointer;
      transition: transform 0.1s, background 0.2s;
      box-sizing: border-box;
    }
    .btn-choix:hover { background: var(--or-fonce); transform: scale(1.03); }
    .emoji-deco { font-size: 2.5rem; text-align: center; margin: 0.5rem 0; }
    .etoiles { font-size: 1.2rem; text-align: center; letter-spacing: 0.3rem; color: var(--bleu-nuit); opacity: 0.5; }
    .page-num { font-family: 'Fredoka One', cursive; font-size: 0.9rem; color: var(--or-fonce); text-align: right; margin-top: 2rem; opacity: 0.7; }
    .footer-auteur { font-family: 'Caveat', cursive; font-size: 0.85rem; text-align: center; color: var(--or-fonce); opacity: 0.7; margin-top: 1rem; }
    .retour-debut { display: block; text-align: center; font-size: 0.9rem; color: var(--or-fonce); text-decoration: none; margin-top: 0.5rem; opacity: 0.6; }
    .retour-debut:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="page">
    <h1>Le tapis volant</h1>
    <div class="emoji-deco">🧞✨🪄</div>
    <div class="etoiles">★ ✦ ★ ✦ ★</div>
    <hr>
    <p>
      Un face de vous il y a un tapis volant, que faite vous ?
    </p>
    <hr>
    <a class="btn-choix" href="gameover-sable.html">Monter sur le tapis (sans le caresser)</a>
    <a class="btn-choix" href="gameover-bandits.html">Continuer de marcher</a>
    <a class="btn-choix" href="vol.html">Le caresser</a>
    <div class="page-num">Page 5 / 10</div>
    <a class="retour-debut" href="intro.html">← Retour au début</a>
    <p class="footer-auteur">Histoire dont vous êtes le héros — par Tulipa, 10 ans 💜</p>
  </div>
</body>
</html>
